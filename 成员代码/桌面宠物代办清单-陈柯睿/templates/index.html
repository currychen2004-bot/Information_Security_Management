<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>桌面宠物待办</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="scene">
      <div class="glow glow-left"></div>
      <div class="glow glow-right"></div>

      <main class="app-shell">
        <section class="pet-panel card">
          <div class="pet-header">
            <div>
              <p class="eyebrow">Desktop Pet Todo</p>
              <h1>桌面宠物待办</h1>
            </div>
            <button id="petAction" class="ghost-button" type="button">摸摸它</button>
          </div>

          <div class="pet-stage">
            <div id="pet" class="pet mood-neutral" aria-label="桌面宠物" role="img">
              <div class="pet-shadow"></div>
              <div class="pet-body">
                <div class="pet-face">
                  <span class="eye eye-left"></span>
                  <span class="eye eye-right"></span>
                  <span class="mouth"></span>
                </div>
                <div class="blush blush-left"></div>
                <div class="blush blush-right"></div>
              </div>
            </div>
          </div>

          <div class="pet-status">
            <div class="status-line">
              <span>心情</span>
              <strong id="moodLabel">加载中</strong>
            </div>
            <div class="status-line">
              <span>等级</span>
              <strong id="levelLabel">Lv.1 小团子</strong>
            </div>
            <div class="status-line">
              <span>成长度</span>
              <strong id="progressLabel">0 / 5</strong>
            </div>
          </div>

          <p id="petSpeech" class="speech-bubble">先从一个小任务开始。</p>
        </section>

        <section class="todo-panel card">
          <div class="todo-top">
            <div>
              <p class="eyebrow">Tiny Tasks</p>
              <h2>今天的待办</h2>
            </div>
            <div class="counter">
              <span id="doneCount">0</span>
              <small>已完成</small>
            </div>
          </div>

          <form id="todoForm" class="todo-form">
            <input
              id="todoInput"
              type="text"
              maxlength="80"
              placeholder="输入一个今天要完成的小任务"
              autocomplete="off"
            />
            <button type="submit">添加任务</button>
          </form>

          <ul id="todoList" class="todo-list"></ul>

          <div class="footer-bar">
            <button id="clearDone" class="ghost-button" type="button">清除已完成</button>
          </div>
        </section>
      </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
